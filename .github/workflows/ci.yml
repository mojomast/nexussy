name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install core with dev deps
        run: pip install -e "core/[dev]"

      - name: Lint with ruff
        run: cd core && python -m ruff check nexussy/

      - name: Run tests
        run: cd core && python -m pytest tests/ -x -q --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t nexussy:ci .
